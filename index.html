<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Pedido Especial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Pacifico&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #636b2f 0%, #490202 50%, #636b2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Corações decorativos de fundo */
        .heart-bg {
            position: fixed;
            font-size: 2rem;
            opacity: 0.15;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .container {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 550px;
            width: 100%;
            position: relative;
            border: 3px solid #636b2f;
        }

        .font-nautilus {
            font-family: 'Playfair Display', 'Pacifico', cursive, sans-serif;
            color: #490202;
            font-size: 2.5rem;
            margin: 20px 0;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(99, 107, 47, 0.3);
            letter-spacing: 1px;
        }

        .main-img {
            max-width: 220px;
            width: 100%;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 3px solid #636b2f;
            box-shadow: 0 5px 15px rgba(99, 107, 47, 0.4);
        }

        /* Retângulo Rosa */
        .pink-box {
            background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%);
            padding: 30px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            min-height: 180px;
            position: relative;
            margin-top: 15px;
            overflow: visible;
            border: 3px solid #636b2f;
            box-shadow: 0 10px 30px rgba(99, 107, 47, 0.3);
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #btnSim {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            z-index: 10;
        }

        #btnSim:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4);
        }

        #btnNao {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            z-index: 5;
        }

        #btnNao:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4);
        }

        /* Grid de Opções (Tela 2) */
        .grid-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .card-option {
            background: linear-gradient(135deg, #fdfdfd 0%, #f5f5f5 100%);
            border: 3px solid #636b2f;
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(99, 107, 47, 0.2);
        }

        .card-option:hover {
            transform: scale(1.05);
            border-color: #490202;
            box-shadow: 0 8px 25px rgba(73, 2, 2, 0.3);
        }

        .card-option img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #636b2f;
        }

        .card-option p {
            margin-top: 10px;
            font-weight: bold;
            color: #490202;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px rgba(99, 107, 47, 0.2);
        }

        /* Detalhes de Confirmação (Tela 3) */
        .info-title {
            font-family: 'Playfair Display', cursive;
            font-size: 2.2rem;
            font-weight: bold;
            color: #490202;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(99, 107, 47, 0.3);
            letter-spacing: 1px;
        }

        .info-details {
            font-size: 1.3rem;
            margin: 12px 0;
            color: #636b2f;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }

        .info-details strong {
            color: #490202;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(99, 107, 47, 0.2);
        }

        .info-highlight {
            font-weight: bold;
            color: #490202;
            margin-top: 15px;
            font-size: 1.15rem;
            text-shadow: 1px 1px 2px rgba(99, 107, 47, 0.2);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366 0%, #20b854 100%);
            color: white;
            padding: 18px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 8px 20px rgba(37,211,102,0.4);
            transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-whatsapp:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(37,211,102,0.5);
        }

        .broken-text {
            color: #490202;
            font-size: 1rem;
            margin-top: 15px;
            font-style: italic;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(99, 107, 47, 0.2);
        }

        .hidden {
            display: none !important;
        }

        .meme-img {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 10px;
            border: 3px solid #636b2f;
            box-shadow: 0 10px 30px rgba(99, 107, 47, 0.4);
        }

        /* Estrelas e decorações */
        .decoration {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.3;
            pointer-events: none;
        }

        /* Confete */
        .confetti {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .confetti-falling {
            animation: confetti-fall 3s ease-in forwards;
        }

        .title-decoration {
            margin: 10px 0;
            font-size: 1.2rem;
            color: #636b2f;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-decoration">💚 ❤️ 💚</div>
        
        <div id="telaPedido">
            <img src="3124cb096ae877ce42772d470b08914e.webp.jpg" id="imgEmoji" class="main-img" alt="Emoji do pedido">
            <h1 class="font-nautilus">você quer sair comigo?</h1>
            
            <div class="pink-box" id="pinkBox">
                <button id="btnSim" class="btn">SIM</button>
                <button id="btnNao" class="btn">NÃO</button>
            </div>
            <div id="brokenMessage" class="broken-text hidden">💔 você quebrou o botão 💔</div>
        </div>

        <div id="telaEscolha" class="hidden">
            <div class="title-decoration">✨ 🎯 ✨</div>
            <h1 class="font-nautilus" style="font-size: 2.5rem; margin-bottom: 15px;">Vamos para?</h1>
            <div class="grid-options">
                <div class="card-option" onclick="selecionarLugar('Nara Cafeteria')">
                    <img src="Screenshot_20260628-202418.png" alt="Nara Cafeteria">
                    <p>☕ Nara Cafeteria</p>
                </div>
                <div class="card-option" onclick="selecionarLugar('Smash N Guys')">
                    <img src="Smashn-Guys.jpg" alt="Smash N Guys">
                    <p>🎮 Smash N Guys</p>
                </div>
                <div class="card-option" onclick="selecionarLugar('Piquenique e Japa')">
                    <img src="7d2531883451385f69642edc08f7395b.jpg" alt="Piquenique e Japa">
                    <p>🍱 Piquenique e Japa</p>
                </div>
                <div class="card-option" onclick="selecionarLugar('Cinema')">
                    <img src="aabc064928ed7a87fb46e5895e54aba0.jpg" alt="Cinema">
                    <p>🎬 Cinema</p>
                </div>
            </div>
        </div>

        <div id="telaConfirmacao" class="hidden">
            <div class="title-decoration">💌 💕 💌</div>
            <div class="info-title">Vou estar te esperando lá, Srta. Coelho!</div>
            <div class="info-details">📅 Data: <strong>30/06</strong></div>
            <div class="info-details">🕐 Horário: <strong>16h</strong></div>
            <div class="info-details" id="lugarSelecionadoText" style="font-weight: bold; font-size: 1.5rem; color: #490202; margin: 15px 0; text-shadow: 1px 1px 2px rgba(99, 107, 47, 0.2);"></div>
            <div class="info-details info-highlight">👗 Dress Code: Green Outfit</div>
            
            <button class="btn-whatsapp" onclick="enviarWhatsapp()">Me de a boa notícia ;)</button>
        </div>

        <div id="telaFinal" class="hidden">
            <img src="2653265de5c8b4b8c539cb9c877eb22e.webp.jpg" class="meme-img" alt="Sucesso final">
        </div>

        <div class="title-decoration" style="margin-top: 20px;">💚 ❤️ 💚</div>
    </div>

    <script>
        let naoClicks = 0;
        let simScale = 1.0;
        let naoScale = 1.0;
        
        const btnSim = document.getElementById('btnSim');
        const btnNao = document.getElementById('btnNao');
        const pinkBox = document.getElementById('pinkBox');
        const brokenMessage = document.getElementById('brokenMessage');
        
        const telaPedido = document.getElementById('telaPedido');
        const telaEscolha = document.getElementById('telaEscolha');
        const telaConfirmacao = document.getElementById('telaConfirmacao');
        const telaFinal = document.getElementById('telaFinal');
        
        let lugarEscolhido = "";

        // Função para criar confete
        function createConfetti() {
            const confettiItems = ['🎉', '💚', '❤️', '✨', '💕', '🎊'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti', 'confetti-falling');
                confetti.textContent = confettiItems[Math.floor(Math.random() * confettiItems.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10vh';
                confetti.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Função para checar se dois retângulos se sobrepõem
        function doButtonsOverlap() {
            const simRect = btnSim.getBoundingClientRect();
            const naoRect = btnNao.getBoundingClientRect();
            
            return !(simRect.right < naoRect.left || 
                     simRect.left > naoRect.right || 
                     simRect.bottom < naoRect.top || 
                     simRect.top > naoRect.bottom);
        }

        // Função para gerar posição aleatória garantindo visibilidade
        function generateRandomPosition() {
            const container = telaPedido;
            const containerRect = container.getBoundingClientRect();
            
            const minX = -100;
            const maxX = window.innerWidth - 100;
            const minY = -100;
            const maxY = window.innerHeight - 100;
            
            let randomX, randomY, overlaps;
            
            do {
                randomX = Math.floor(Math.random() * (maxX - minX)) + minX;
                randomY = Math.floor(Math.random() * (maxY - minY)) + minY;
                
                btnNao.style.left = randomX + 'px';
                btnNao.style.top = randomY + 'px';
                
                overlaps = doButtonsOverlap();
            } while (overlaps);
            
            return { x: randomX, y: randomY };
        }

        // Lógica inteligente do botão "NÃO"
        btnNao.addEventListener('click', function() {
            naoClicks++;
            
            if (naoClicks <= 3) {
                simScale += 0.35;
                naoScale -= 0.15;
                btnSim.style.transform = `scale(${simScale})`;
                btnNao.style.transform = `scale(${naoScale})`;
            } 
            else if (naoClicks > 3 && naoClicks <= 6) {
                btnNao.style.position = 'fixed';
                generateRandomPosition();
            } 
            else if (naoClicks > 6) {
                btnNao.style.position = 'relative';
                btnNao.style.left = '0';
                btnNao.style.top = '0';
                btnNao.style.transform = 'scale(1)';
                btnNao.style.backgroundColor = '#b2bec3';
                btnNao.style.color = '#636e72';
                btnNao.style.cursor = 'not-allowed';
                btnNao.disabled = true;
                
                brokenMessage.classList.remove('hidden');
            }
        });

        // Evento do botão "SIM" leva à escolha de lugar
        btnSim.addEventListener('click', function() {
            createConfetti();
            setTimeout(() => {
                telaPedido.classList.add('hidden');
                telaEscolha.classList.remove('hidden');
            }, 300);
        });

        // Função executada ao clicar no card de um dos locais
        function selecionarLugar(lugar) {
            lugarEscolhido = lugar;
            document.getElementById('lugarSelecionadoText').innerText = '📍 ' + lugar;
            telaEscolha.classList.add('hidden');
            telaConfirmacao.classList.remove('hidden');
        }

        // Envia os dados estruturados para o WhatsApp especificado
        function enviarWhatsapp() {
            const numero = "5515981308901"; 
            const mensagem = `Te vejo lá, Srta. Batista.\nData: 30/06\nHorário: 16h\nLugar: ${lugarEscolhido}\nDress Code: Green Outfit`;
            
            const urlCompleta = `https://api.whatsapp.com/send?phone=${numero}&text=${encodeURIComponent(mensagem)}`;
            
            window.open(urlCompleta, '_blank');
            
            telaConfirmacao.classList.add('hidden');
            telaFinal.classList.remove('hidden');
        }
    </script>
</body>
</html>
